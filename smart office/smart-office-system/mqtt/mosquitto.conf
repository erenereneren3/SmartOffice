listener
    port 1883
    protocol mqtt

listener
    port 9001
    protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
log_type subscribe

max_keepalive 120
max_inflight_messages 40
max_queued_messages 1000
